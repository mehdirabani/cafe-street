<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafe Street</title>
    <link rel="stylesheet" href="./Styles/css-reset.min.css" />
    <link rel="stylesheet" href="Styles/utility-class.min.css" />
    <link rel="stylesheet" href="Styles/style.min.css" />
    <link rel="stylesheet" href="Styles/style.css" />
    <link
      rel="shortcut icon"
      href="./assets/images/fav-icon.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <!-- * Start Header -->
    <header class="header">
      <img
        src="./assets/images/cafe-bg.png"
        alt="Cafe bg"
        class="header-top-bg"
      />
      <img
        src="./assets/images/cafe-bg.png"
        alt="Cafe bg"
        class="header-bot-bg"
      />
      <div class="container">
        <!-- ? Start Header Top -->
        <div class="header__top">
          <!-- Add logo -->
          <img
            src="./assets/images/logo_coffe.png"
            alt="لوگو وب سایت"
            class="header__logo"
          />
          <!-- Add menu -->
          <nav class="nav">
            <ul class="menu">
              <li class="menu__item menu__item--active">
                <a href="#" class="menu__item-link">About us</a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__item-link">Our Product</a>
              </li>
              <li class="menu__item">
                <a href="#" class="menu__item-link">Delivery</a>
              </li>
            </ul>
          </nav>
          <div class="header__top-element-wrapper">
            <!-- Add Header Top Element -->
            <form action="" class="header__top-search-box" role="search">
              <input
                type="text"
                placeholder="Cappuccino"
                class="header__top-search-box-input"
              />
            </form>
            <button class="header__top-shopping-cart">
              <img
                src="./assets/svgs/Shopping-cart.svg"
                alt="shoppingCart Icon"
                class="header__top-shopping-cart-img"
              />
            </button>
          </div>
        </div>
        <!-- ? Start Header Main -->
        <div class="header__main mt50">
          <!-- Add Header Description -->
          <div class="header__description">
            <h2 class="header__description-title">
              Enjoy your <span>coffee</span> before your activity
            </h2>
            <p class="header__description-text">
              Boost your productivity and build your mood with a glass of coffee
              in the morning
            </p>
            <div class="header__description-btn-wrapper">
              <button class="btn btn--primary">
                <p class="header__description-btn-text">Order now</p>
                <img
                  src="./assets/svgs/Shopping-cart.svg"
                  alt="cart"
                  class="header__description-btn-img"
                />
              </button>
              <button class="btn btn--none">More menu</button>
            </div>
          </div>
          <!-- Add Header Image Box -->
          <div class="header__main_image-box">
            <img
              src="./assets/images/image-box.png"
              alt="Cafe Cup"
              class="header__main-image-box-img"
            />
            <!-- Add Badge  -->
            <div class="badge-wrapper badge--one">
              <div class="badge">Cappuccino</div>
            </div>
            <div class="badge-wrapper badge--tow">
              <div class="badge">
                <p class="badge__text">4.8</p>
                <img
                  src="./assets/svgs/Star.svg"
                  alt="star"
                  class="badge__img"
                />
              </div>
            </div>
            <div class="badge-wrapper badge--three">
              <div class="badge">18K</div>
            </div>
          </div>
        </div>
      </div>
    </header>
    <!-- ! End Header Section -->
    <!-- * Start Popular Section -->
    <section class="popular">
      <div class="container">
        <h3 class="title my20 popular-title">Popular <span>Now</span></h3>
        <div class="popular__wrapper mt100">
          <!-- Add First Card -->
          <div class="card-wrapper popular__card-wrapper">
            <div class="card">
              <div class="card-image-box">
                <!-- Add Image Card -->
                <img
                  src="./assets/images/Popular-cart-1.jpg"
                  alt="Popular-card-1"
                  class="card-img"
                />
              </div>
              <div class="card-title-wrapper">
                <!-- Add Title & Point Card -->
                <h4 class="card-title">Vanilla Latte</h4>
                <h4 class="card-point">23K</h4>
              </div>
              <div class="card-description">
                <div class="card-btn-wrapper">
                  <!-- Add Button -->
                  <button class="card-btn card__btn--active">Hot</button>
                  <button class="card-btn">Cold</button>
                </div>
                <button class="shopping-cart">
                  <img
                    src="./assets/svgs/Shopping-cart.svg"
                    alt="shopping-cart"
                    class="shopping-cart-img"
                  />
                </button>
              </div>
            </div>
          </div>
          <!-- Add Second Card -->
          <div class="card-wrapper popular__card-wrapper">
            <div class="card">
              <div class="card-image-box">
                <!-- Add Image Card -->
                <img
                  src="./assets/images/Popular-cart-2.jpg"
                  alt="Popular-card-2"
                  class="card-img"
                />
              </div>
              <div class="card-title-wrapper">
                <!-- Add Title & Point Card -->
                <h4 class="card-title">Espresso</h4>
                <h4 class="card-point">23K</h4>
              </div>
              <div class="card-description">
                <div class="card-btn-wrapper">
                  <!-- Add Button -->
                  <button class="card-btn card__btn--active">Hot</button>
                  <button class="card-btn">Cold</button>
                </div>
                <button class="shopping-cart">
                  <img
                    src="./assets/svgs/Shopping-cart.svg"
                    alt="shopping-cart"
                    class="shopping-cart-img"
                  />
                </button>
              </div>
            </div>
          </div>
          <!-- Add Three Card -->
          <div class="card-wrapper popular__card-wrapper">
            <div class="card">
              <div class="card-image-box">
                <!-- Add Image Card -->
                <img
                  src="./assets/images/Popular-cart-3.jpg"
                  alt="Popular-card-3"
                  class="card-img"
                />
              </div>
              <div class="card-title-wrapper">
                <!-- Add Title & Point Card -->
                <h4 class="card-title">Hazelnut Latte</h4>
                <h4 class="card-point">23K</h4>
              </div>
              <div class="card-description">
                <div class="card-btn-wrapper">
                  <!-- Add Button -->
                  <button class="card-btn card__btn--active">Hot</button>
                  <button class="card-btn">Cold</button>
                </div>
                <button class="shopping-cart">
                  <img
                    src="./assets/svgs/Shopping-cart.svg"
                    alt="shopping-cart"
                    class="shopping-cart-img"
                  />
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
